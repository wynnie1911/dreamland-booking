<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session — My Little Dreamland</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF8F4;       /* Đổi nền về màu kem sữa tinh tế, dịu mắt, hết chói 100% */
    --white: #FFFFFF;
    --ink: #1A1714;
    --ink-soft: #6B6560;
    --ink-faint: #EAE6E0;
    
    /* Bộ màu kẹo ngọt Pastel Cầu Vồng */
    --sage: #ffadad;         /* Nền nút bấm giờ: Hồng pastel */
    --sage-light: #ffe3e8;   /* Nền hồng siêu nhẹ khi hover */
    --sage-dark: #ff8fa3;    /* Màu hồng đậm hơn tí khi chọn */
    --blush: #ffd6a5;        /* Cam đào nhạt */
    --radius: 14px;
    --radius-sm: 8px;
  }

  html { background: var(--cream); }

  body {
    font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Comic Neue", sans-serif; /* Tích hợp font chữ Comic Sans đáng yêu */
    font-size: 15px;
    color: var(--ink);
    background: var(--cream);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Đổi toàn bộ font tiêu đề sang Comic Sans đồng bộ */
  .header-title, .card-title, .success-title {
    font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", sans-serif !important;
    font-weight: bold;
  }

  /* Mix bộ số 1-2-3 và đường nối sang màu Xanh Dương Pastel */
  .step .step-num {
    border: 1.5px solid #bdb2ff !important; /* Viền tím xanh nhạt */
    color: #a0c4ff !important;              /* Số màu xanh dương pastel */
    background: var(--white) !important;
  }
  .step.active .step-num {
    background: #a0c4ff !important;         /* Xanh dương khi active */
    border-color: #a0c4ff !important;
    color: white !important;
  }
  .step.done .step-num {
    background: #caffbf !important;         /* Khi hoàn thành đổi sang Xanh Lá pastel */
    border-color: #caffbf !important;
    color: #4A7259 !important;
  }
  .step.active .step-label {
    color: #a0c4ff !important;              /* Chữ bước active sang xanh dương */
    font-weight: bold;
  }
  .step-line {
    background: #bdb2ff !important;         /* Đường nối màu tím xanh nhạt */
  }

  /* Cải tiến: Đổi màu viền lịch picker sang màu vàng chanh pastel */
  .date-input:focus { 
    border-color: #fdffb6 !important; 
    box-shadow: 0 0 0 3px #fffde6 !important;
  }

  /* Header */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--ink-faint);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--sage-light) !important;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 1px;
  }

  /* Container */
  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Steps indicator */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 28px 0 24px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .step-label {
    font-size: 12px;
    color: var(--ink-soft);
    transition: color 0.2s;
  }
  .step-line {
    flex: 1;
    height: 1px;
    margin: 0 8px;
    max-width: 40px;
  }

  /* Cards */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid #EAE6E0;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Date picker */
  .date-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--ink-faint);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    background: var(--white);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }

  /* Slot grid */
  .slots-loading {
    text-align: center;
    padding: 32px;
    color: var(--ink-soft);
    font-size: 13px;
  }
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 4px;
  }

    padding: 12px 8px;
    border
